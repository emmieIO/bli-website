name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, gd, zip, pdo, pdo_mysql

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Cache NPM
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}

      - run: composer install --no-interaction --prefer-dist --no-dev
      - run: npm ci
      - run: npm run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: ${{ secrets.VPS_DEPLOY_PATH }}
          strip_components: 0
          rm: false

      - name: Post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            php artisan down
            trap 'php artisan up' EXIT
            mkdir -p storage/app/public/program_covers bootstrap/cache

            WEB_GROUP="${{ secrets.VPS_WEB_GROUP }}"
            WEB_GROUP="${WEB_GROUP:-www-data}"
            DEPLOY_USER="$(id -un)"

            if sudo -n true 2>/dev/null; then
              sudo chown -R "$DEPLOY_USER:$WEB_GROUP" storage bootstrap/cache
            else
              chgrp -R "$WEB_GROUP" storage bootstrap/cache
            fi

            chmod -R ug+rwX storage bootstrap/cache
            php artisan storage:link --force
            test -w storage/app/public
            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize
            php artisan ziggy:generate
            php artisan up
            trap - EXIT
